name: Nix Configuration Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-nixos:
    name: NixOS Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --no-build 2>&1 || true

      - name: Evaluate NixOS configuration
        run: |
          nix eval .#nixosConfigurations.main.config.system.build.toplevel --raw 2>&1 | head -1
          echo "NixOS configuration evaluates successfully"

      - name: Check flake metadata
        run: nix flake metadata

  check-darwin:
    name: Darwin Configuration
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --no-build 2>&1 || true

      - name: Evaluate Darwin configuration
        run: |
          nix eval .#darwinConfigurations.joel.config.system.build.toplevel --raw 2>&1 | head -1
          echo "Darwin configuration evaluates successfully"

  check-shared-modules:
    name: Shared Module Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Parse all nix files for syntax errors
        run: |
          echo "Checking Nix syntax..."
          FAILED=0
          find . -name "*.nix" -not -path "./.git/*" | sort | while read f; do
            # Skip known empty/broken files
            if [ ! -s "$f" ]; then
              echo "  SKIP (empty): $f"
              continue
            fi
            if ! nix-instantiate --parse "$f" > /dev/null 2>&1; then
              echo "FAIL: $f"
              nix-instantiate --parse "$f"
              exit 1
            fi
            echo "  OK: $f"
          done
          echo "All Nix files parse successfully"

      - name: Verify shared modules exist
        run: |
          echo "Checking shared module structure..."
          for f in modules/home/default.nix modules/home/shell.nix modules/home/programs.nix \
                   modules/home/git.nix modules/home/direnv.nix modules/home/ghostty.nix \
                   modules/home/ssh.nix; do
            test -f "$f" && echo "  OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All shared modules present"

      - name: Verify darwin modules exist
        run: |
          echo "Checking darwin module structure..."
          for f in darwin/default.nix darwin/homebrew.nix darwin/networking.nix \
                   pkgs/claude-code.nix; do
            test -f "$f" && echo "  OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All darwin modules present"
