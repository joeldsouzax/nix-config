name: Nix Configuration Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate: every .nix file must parse; formatting is advisory ──────────
  lint:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Parse all .nix files
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r f; do
            [ -s "$f" ] || { echo "skip (empty): $f"; continue; }
            if ! nix-instantiate --parse "$f" >/dev/null 2>err; then
              echo "::error file=$f::$(head -1 err)"
              fail=1
            fi
          done < <(find . -name '*.nix' -not -path './.git/*' | sort)
          exit $fail

      - name: Formatting (nixfmt) — advisory
        continue-on-error: true
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- --check \
            $(find . -name '*.nix' -not -path './.git/*')

  # ── Real check: the whole NixOS closure must evaluate (incl. IFD) ─────────
  eval-nixos:
    name: Evaluate NixOS (main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://hyprland.cachix.org https://nix-community.cachix.org
            extra-trusted-public-keys = hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      # .drvPath forces the full module fixpoint + import-from-derivation
      # (nix-doom-emacs). No `|| true`, no `| head` — a failure fails the job.
      - name: Evaluate toplevel derivation
        run: nix eval --raw .#nixosConfigurations.main.config.system.build.toplevel.drvPath

  # ── Real check: the Darwin closure must evaluate ──────────────────────────
  eval-darwin:
    name: Evaluate Darwin (joel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Evaluate toplevel derivation
        run: nix eval --raw .#darwinConfigurations.joel.config.system.build.toplevel.drvPath

  # ── Actual test: boot a NixOS VM and assert behaviour (nixosTest) ─────────
  integration-test:
    name: Integration VM test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # nixosTest runs a QEMU guest — give the runner access to /dev/kvm.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Build & run integration test
        run: nix build --print-build-logs .#checks.x86_64-linux.integration
